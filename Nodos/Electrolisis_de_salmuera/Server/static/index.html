<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor de electrólisis de salmuera</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#10141a;
    --panel:#171c24;
    --panel-2:#1e2530;
    --border:#2b3441;
    --text:#e7ebef;
    --text-muted:#8996a6;
    --accent:#39c9b8;
    --accent-dim:#1f6f66;
    --normal:#4fd07c;
    --ajustar:#f0b94a;
    --detener:#f16358;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(57,201,184,0.08), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;
  }
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:22px 32px;
    border-bottom:1px solid var(--border);
  }
  .titulo{
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .titulo .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.14em;
    color:var(--accent);
    text-transform:uppercase;
  }
  .titulo h1{
    margin:0;
    font-size:22px;
    font-weight:700;
    letter-spacing:-0.01em;
  }
  .conexion{
    display:flex;
    align-items:center;
    gap:10px;
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--text-muted);
  }
  .punto{
    width:9px;height:9px;border-radius:50%;
    background:var(--detener);
    box-shadow:0 0 0 0 rgba(241,99,88,0.6);
  }
  .punto.ok{
    background:var(--normal);
    animation:pulso 1.8s ease-out infinite;
  }
  @keyframes pulso{
    0%{box-shadow:0 0 0 0 rgba(79,208,124,0.5);}
    70%{box-shadow:0 0 0 8px rgba(79,208,124,0);}
    100%{box-shadow:0 0 0 0 rgba(79,208,124,0);}
  }
  main{
    padding:28px 32px 48px;
    max-width:1280px;
    margin:0 auto;
  }
  .grid-cards{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(260px,1fr));
    gap:18px;
    margin-bottom:32px;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:10px;
    padding:18px 18px 8px;
    position:relative;
    overflow:hidden;
  }
  .card-head{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    margin-bottom:10px;
  }
  .card-head h3{
    margin:0;
    font-size:14px;
    font-weight:600;
  }
  .badge{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    font-weight:700;
    letter-spacing:0.04em;
    padding:3px 9px;
    border-radius:20px;
    text-transform:uppercase;
    border:1px solid transparent;
  }
  .badge.NORMAL{ color:var(--normal); background:rgba(79,208,124,0.12); border-color:rgba(79,208,124,0.3);}
  .badge.AJUSTAR{ color:var(--ajustar); background:rgba(240,185,74,0.12); border-color:rgba(240,185,74,0.3);}
  .badge.DETENER{
    color:var(--detener); background:rgba(241,99,88,0.14); border-color:rgba(241,99,88,0.35);
    animation:alarma 1.1s ease-in-out infinite;
  }
  @keyframes alarma{
    0%,100%{ box-shadow:0 0 0 0 rgba(241,99,88,0.35); }
    50%{ box-shadow:0 0 0 5px rgba(241,99,88,0); }
  }
  .campo-actual{
    display:flex;
    gap:14px;
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--text-muted);
    margin-bottom:6px;
  }
  .campo-actual b{ color:var(--text); font-weight:600; }
  .chart-wrap{ height:110px; }
  .imp-flag{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    margin-top:4px;
    color:var(--text-muted);
  }
  .imp-flag.on{ color:var(--detener); }

  .paneles-json{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
  }
  @media (max-width:820px){ .paneles-json{ grid-template-columns:1fr; } }
  .panel-json{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:10px;
    overflow:hidden;
  }
  .panel-json .cabecera{
    padding:10px 16px;
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--panel-2);
  }
  .panel-json .cabecera span{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--text-muted);
  }
  .flujo-dir{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--accent);
  }
  pre{
    margin:0;
    padding:14px 16px;
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    line-height:1.6;
    color:var(--text);
    max-height:340px;
    overflow:auto;
  }
</style>
</head>
<body>

<header>
  <div class="titulo">
    <span class="eyebrow">Server_Salmuera &middot; live</span>
    <h1>Monitor de electrólisis de salmuera</h1>
  </div>
  <div class="conexion">
    <span class="punto" id="punto-conexion"></span>
    <span id="texto-conexion">conectando...</span>
  </div>
</header>

<main>
  <div class="grid-cards" id="grid-cards"></div>

  <div class="paneles-json">
    <div class="panel-json">
      <div class="cabecera">
        <span>Datos crudos</span>
        <span class="flujo-dir">salmuera &rarr; controlador</span>
      </div>
      <pre id="json-datos">{}</pre>
    </div>
    <div class="panel-json">
      <div class="cabecera">
        <span>Estado evaluado</span>
        <span class="flujo-dir">controlador &rarr; salmuera</span>
      </div>
      <pre id="json-estado">{}</pre>
    </div>
  </div>
</main>

<script>
// la misma clave identifica tanto el dato crudo (reporte_dict) como el
// estado evaluado (estado_salmuera), porque main.py ya las envía así
const CARDS = [
  { key:"tubo_h2_salmuera",       titulo:"Tubo colector H\u2082",  campos:["presion","concentracion"], bool:"impurezas" },
  { key:"tubo_cl2_salmuera",      titulo:"Tubo colector Cl\u2082", campos:["presion","concentracion"], bool:"impurezas" },
  { key:"deposito_h2_salmuera",   titulo:"Dep\u00f3sito H\u2082",  campos:["presion","cantidad"] },
  { key:"deposito_cl2_salmuera",  titulo:"Dep\u00f3sito Cl\u2082", campos:["presion","cantidad"] },
  { key:"deposito_naoh_salmuera", titulo:"Dep\u00f3sito NaOH",     campos:["concentracion","cantidad"] },
];
const COLORES_CAMPO = { presion:"#39c9b8", concentracion:"#f0b94a", cantidad:"#7aa6ff" };
const MAX_PUNTOS = 30;

const grid = document.getElementById("grid-cards");
const charts = {};

CARDS.forEach(c => {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <div class="card-head">
      <h3>${c.titulo}</h3>
      <span class="badge NORMAL" id="badge-${c.key}">NORMAL</span>
    </div>
    <div class="campo-actual" id="valores-${c.key}"></div>
    <div class="chart-wrap"><canvas id="chart-${c.key}"></canvas></div>
    ${c.bool ? `<div class="imp-flag" id="flag-${c.key}">${c.bool}: false</div>` : ""}
  `;
  grid.appendChild(card);

  const ctx = document.getElementById(`chart-${c.key}`).getContext("2d");
  charts[c.key] = new Chart(ctx, {
    type: "line",
    data: {
      labels: [],
      datasets: c.campos.map(campo => ({
        label: campo,
        data: [],
        borderColor: COLORES_CAMPO[campo],
        backgroundColor: "transparent",
        borderWidth: 1.75,
        pointRadius: 0,
        tension: 0.25,
      })),
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: { mode: "nearest", intersect: false },
      plugins: {
        legend: {
          display: true, position: "bottom",
          labels: { color: "#8996a6", boxWidth: 10, font: { size: 10, family: "JetBrains Mono" } }
        }
      },
      scales: {
        x: { display: false },
        y: { grid: { color: "#2b3441" }, ticks: { color: "#8996a6", font: { size: 10 } } }
      }
    }
  });
});

function actualizarCard(c, datos, estadoGlobal) {
  const badge = document.getElementById(`badge-${c.key}`);
  let estado = "NORMAL";
  if (estadoGlobal) {
    estado = ("global" in estadoGlobal) ? estadoGlobal.global : (estadoGlobal[c.key] || "NORMAL");
  }
  badge.textContent = estado;
  badge.className = `badge ${estado}`;

  const valores = document.getElementById(`valores-${c.key}`);
  valores.innerHTML = c.campos.map(campo => {
    const v = datos ? datos[campo] : undefined;
    return `<span>${campo}: <b>${typeof v === "number" ? v.toFixed(2) : "--"}</b></span>`;
  }).join("");

  if (c.bool && datos) {
    const flag = document.getElementById(`flag-${c.key}`);
    const activo = !!datos[c.bool];
    flag.textContent = `${c.bool}: ${activo}`;
    flag.className = `imp-flag ${activo ? "on" : ""}`;
  }

  const chart = charts[c.key];
  const etiqueta = new Date().toLocaleTimeString();
  chart.data.labels.push(etiqueta);
  if (chart.data.labels.length > MAX_PUNTOS) chart.data.labels.shift();

  chart.data.datasets.forEach(ds => {
    const v = datos ? datos[ds.label] : undefined;
    ds.data.push(typeof v === "number" ? v : null);
    if (ds.data.length > MAX_PUNTOS) ds.data.shift();
  });
  chart.update("none");
}

function conectarWebSocket() {
  const protocolo = location.protocol === "https:" ? "wss" : "ws";
  const ws = new WebSocket(`${protocolo}://${location.host}/ws`);
  const punto = document.getElementById("punto-conexion");
  const texto = document.getElementById("texto-conexion");

  ws.onopen = () => { texto.textContent = "esperando datos..."; };

  ws.onmessage = (evento) => {
    const estado = JSON.parse(evento.data);

    punto.className = `punto ${estado.conectado ? "ok" : ""}`;
    texto.textContent = estado.conectado ? "conectado a Server_Salmuera" : "sin conexi\u00f3n al servidor OPC UA";

    CARDS.forEach(c => actualizarCard(c, estado.datos[c.key], estado.estado));

    document.getElementById("json-datos").textContent = JSON.stringify(estado.datos, null, 2);
    document.getElementById("json-estado").textContent = JSON.stringify(estado.estado, null, 2);
  };

  ws.onclose = () => {
    punto.className = "punto";
    texto.textContent = "desconectado, reintentando...";
    setTimeout(conectarWebSocket, 2000);
  };
}

conectarWebSocket();
</script>
</body>
</html>
